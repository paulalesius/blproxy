# Test configuration for llmproxy
# Minimal setup for running tests

server:
  host: "127.0.0.1"
  port: 4002

backends:
  llm:
    url: "http://127.0.0.1:8001"
    locks:
      - chat
      - embeddings
      
  embed:
    url: "http://127.0.0.1:8002"
    locks:
      - embeddings
      
  rerank:
    url: "http://127.0.0.1:8003"
    locks: []
    
  audio:
    url: "http://127.0.0.1:8004"
    locks:
      - chat

# Lock configuration
lock:
  enabled: true
  locked_error: false
  retry_after: 5
